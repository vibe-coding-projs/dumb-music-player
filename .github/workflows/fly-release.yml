name: Release to Fly

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Set version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to Fly PyPI
        run: twine upload --repository-url $FLY_URL/artifactory/api/pypi/pypi dist/*
        env:
          TWINE_USERNAME: or@zerodouble.com
          TWINE_PASSWORD: ${{ secrets.JFROG_TOKEN }}

      - name: Register release in Fly
        uses: jfrog/fly-action/upload@v1
        with:
          name: dumb-music-player
          version: 1.0.${{ github.run_number }}
          files: dist/dumb_music_player-1.0.${{ github.run_number }}-py3-none-any.whl
